# CHPR Resources Hub — HTTP vhost. Redirects everything to HTTPS, EXCEPT the
# ACME challenge path so certbot's HTTP-01 renewal keeps working.
#
# Install: copy to /etc/apache2/sites-available/, then a2ensite + reload.
<VirtualHost *:80>
    ServerName chpr-resource.org
    ServerAlias www.chpr-resource.org

    # Let certbot answer ACME challenges over plain HTTP. Uses a NEUTRAL
    # webroot (/var/www/letsencrypt) — deliberately NOT REDCap's docroot
    # (/var/www/html) so cert renewal never writes into patient-data space.
    # `certbot certonly --webroot -w /var/www/letsencrypt` drops the token here.
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory "/var/www/letsencrypt/.well-known/acme-challenge/">
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>
