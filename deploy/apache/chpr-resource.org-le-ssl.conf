# CHPR Resources Hub — HTTPS vhost.
#
# CRITICAL (SERVER_HANDOVER §4.2): listens on 127.0.0.1:4443, NOT *:443.
# sslh fronts :443 and routes HTTPS to Apache on 127.0.0.1:4443. A *:443
# vhost would fall through to the SMS wildcard via SNI.
#
# Serving model (mirrors the app's design — Django self-serves the SPA):
#   /media/  -> Apache Alias to the bind-mounted host dir (fast, esp. videos)
#   /        -> reverse-proxied to the gunicorn web container (127.0.0.1:8300),
#               which serves the React SPA, /api, /admin and /static (WhiteNoise)
#
# All headers are scoped INSIDE this vhost — never global (REDCap iframe
# incident, §4.1).
<IfModule mod_ssl.c>
<VirtualHost 127.0.0.1:4443>
    ServerName chpr-resource.org
    ServerAlias www.chpr-resource.org

    # --- Uploaded media: served directly from the host bind-mount ---
    # docker-compose bind-mounts /opt/chpr/media into the container's
    # MEDIA_ROOT, so the files are on the host filesystem here. Serving
    # them via Apache keeps large PDFs/videos off the gunicorn workers.
    Alias /media/ /opt/chpr/media/
    <Directory /opt/chpr/media/>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
    # Do NOT proxy /media/ — Apache owns it (the ProxyPass / below would
    # otherwise swallow it).
    ProxyPass /media/ !

    # Tell Django (via gunicorn) the original scheme so request.is_secure()
    # is True, secure cookies are sent, and absolute URLs are https://.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Everything else -> gunicorn (SPA shell, /api, /admin, /static).
    ProxyPass        /         http://127.0.0.1:8300/
    ProxyPassReverse /         http://127.0.0.1:8300/

    # Long-cache the hashed SPA bundle assets (Vite ships *.[hash].js etc).
    <LocationMatch "^/static/.*\.(js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Per-vhost security headers ONLY (never global — §4.1).
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/chpr-resource-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/chpr-resource-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/chpr-resource.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/chpr-resource.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
