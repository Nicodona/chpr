<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — CHPR Resources Hub</title>
  <link rel="stylesheet" href="../css/internal.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark">CH</div>
      <div class="login-logo-text">
        CHPR Resources Hub
        <span>Create an account</span>
      </div>
    </div>

    <h2>Request access</h2>
    <p class="subtitle">Fill in your details below. An administrator will review your registration and you'll be notified by email when a decision is made.</p>

    <div class="login-error" id="regError"></div>

    <div class="form-group">
      <label class="form-label" for="name">Full name</label>
      <input class="form-input" type="text" id="name" placeholder="e.g. Jane Doe" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@chprhealth.org" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="3–24 chars, letters/numbers" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm">Confirm password</label>
      <input class="form-input" type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password"/>
    </div>

    <button class="btn-primary" id="registerBtn">Create account</button>

    <div class="register-link-wrap">
      Already have an account? <a href="../index.html">Sign in</a>
    </div>

    <div style="margin-top:1.5rem;text-align:center">
      <a href="../../index.html" style="font-size:12px;color:var(--text-muted);text-decoration:none">← Back to public site</a>
    </div>
  </div>
</div>

<script src="../js/internal.js"></script>
<script>
  // Already logged in? Skip to dashboard
  if (authGetUser()) window.location.href = "dashboard.html";

  function showError(msg) {
    const el = document.getElementById("regError");
    el.textContent = msg;
    el.style.display = "block";
  }

  function doRegister() {
    document.getElementById("regError").style.display = "none";

    const name     = document.getElementById("name").value;
    const email    = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirm").value;

    if (password !== confirm) { showError("Passwords do not match."); return; }

    const result = authRegister({ name, email, username, password });
    if (!result.ok) { showError(result.message); return; }

    // Send the user to the login page with a confirmation banner
    window.location.href = "../index.html?msg=registered";
  }

  document.getElementById("registerBtn").addEventListener("click", doRegister);
  ["name","email","username","password","confirm"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") doRegister();
    });
  });
</script>
</body>
</html>
